name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "Checking deployment path..."
            pwd
            ls -al app.js
            cd ~/backend-erp
            git fetch origin main
            git reset --hard origin/main
            npm install
            # Cleanup
            sudo fuser -k 3000/tcp || true
            pm2 stop all || true
            pm2 delete backend-erp || pm2 delete app || true
            # Start fresh
            pm2 start app.js --name backend-erp
            pm2 save
            # Verification logs
            sleep 5
            pm2 status
            curl -v http://localhost:3000/ping
            curl -v http://localhost:3000/version


