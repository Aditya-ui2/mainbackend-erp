name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ~/backend-erp
            git fetch origin main
            git reset --hard origin/main
            npm install
            # Kill any process currently occupying port 3000 to prevent 'Port in use' errors
            sudo fuser -k 3000/tcp || true
            sleep 2
            # Restart or Start the process
            pm2 delete backend-erp || pm2 delete app || true
            pm2 start app.js --name backend-erp
            pm2 save
            # Verification
            sleep 5
            curl -v http://localhost:3000/ping

